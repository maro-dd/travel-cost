<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>交通費計算</title>
<style>
:root {
  --bg: #f6f7f4; --panel: #ffffff; --ink: #1e2528; --muted: #687479;
  --line: #d9dfd9; --accent: #1c7c7d; --accent-2: #d94b3d; --pink: #e8607a;
  --soft: #e8f4f2; --warn: #fff4cc; --shadow: 0 14px 36px rgba(24,36,40,0.11);
}

* { box-sizing: border-box; }

body { 
  margin: 0; color: var(--ink); 
  background: linear-gradient(180deg,#eef5f4 0,var(--bg) 260px); 
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
}

#app { display: none; }
#app.active { display: block; }

/* ── ヘッダー */
.app-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px clamp(16px, 4vw, 22px); 
  background: #1f2b2e; color: #fff;
}
.eyebrow { color: #bdcccd; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 4px; }
h1 { font-size: clamp(22px, 3vw, 32px); margin: 0; line-height: 1.2; font-weight: bold; }
h2 { font-size: 18px; margin: 0; line-height: 1.2; }

/* ── レイアウト ── */
.shell {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px; padding: 22px; max-width: 1120px; margin: 0 auto;
}
.wide { grid-column: 1 / -1; }
.row-form, .grid-form, .actions, .section-head, .trip-card-head, .summary { display: flex; gap: 10px; align-items: center; }
.section-head, .trip-card-head, .summary { justify-content: space-between; }
.section-head { margin-bottom: 12px; }
.grid-form { display: grid; grid-template-columns: 1fr auto; }
label { display: grid; gap: 5px; font-size: 12px; color: var(--muted); }

/* ── パネル ── */
.panel { 
  background: var(--panel); border: 1px solid var(--line); 
  border-radius: 14px; box-shadow: var(--shadow); padding: 15px; min-width: 0; 
  transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease; 
}
.panel:hover { 
  transform: translateY(-2px); box-shadow: 0 18px 42px rgba(24,36,40,0.13); border-color: #ccd7d3; 
}

/* ── フォーム部品 ── */
button, input, select { font: inherit; }
input, select { 
  width: 100%; border: 1px solid var(--line); border-radius: 7px; 
  padding: 8px 9px; color: var(--ink); background: #fff; min-height: auto;
}
.title-input { margin-bottom: 14px; }
input[type="password"]::-ms-reveal { display: none; }

/* ── ボタン ── */
button { 
  border: 0; border-radius: 7px; padding: 9px 12px; color: #fff; 
  background: var(--accent); cursor: pointer; white-space: nowrap; 
  transition: filter .15s, transform .12s, background .15s;
}
@media (hover: hover) {
  button:hover { filter: brightness(0.88); transform: scale(1.03); }
}
button:active { transform: scale(0.99); filter: brightness(0.82); }

/* サブボタン（グレー背景） */
button.secondary { background: #5d6970; }
button:disabled { opacity: 0.45; pointer-events: none; }

/* ── チップと×ボタン ── */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.chip { 
  display: inline-flex; align-items: center; gap: 7px; min-height: 34px; 
  padding: 6px 10px; background: #eef7f4; border: 1px solid #cfe2dc; border-radius: 999px; font-size: 13px;
}
.icon-button, .delete-button, .removeCar {
  display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; 
  border-radius: 50%; border: none; background: transparent; color: var(--muted); 
  padding: 0 0 2px 0; font-size: 13px; font-weight: 700; cursor: pointer; 
  transition: color .15s, background .15s, transform .12s; min-height: auto;
}
.icon-button:hover, .delete-button:hover, .removeCar:hover { 
  color: var(--accent-2); background: rgba(217,75,61,0.08); transform: scale(1.15); filter: none; 
}
.icon-button:active, .delete-button:active, .removeCar:active { transform: scale(0.82); }

/* ── チェックボックス（割り勘メンバー選択） ── */
.participants { margin-top: 15px; }
.participant-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; touch-action: pan-y; user-select: none; }
.check {
  display: flex; align-items: center; gap: 7px; color: var(--ink); font-size: 13px;
  min-height: 46px; padding: 9px 11px; border-radius: 8px; background: #fff; border: 1px solid var(--line);
  transition: all 0.2s ease;
}
.check input { width: 22px; height: 22px; min-height: 22px; padding: 0; accent-color: var(--accent); }
.check:has(input:checked) { background: #eef7f4; border-color: #cfe2dc; }

/* ── 折りたたみメニュー ── */
.collapsible { display: block; }
.collapsible > summary {
  display: flex; align-items: center; justify-content: space-between;
  min-height: 54px; padding: 11px 12px;
  background: #f4f7f6; color: var(--ink);
  cursor: pointer; font-weight: 700; border-radius: 8px;
  list-style: none; user-select: none; transition: all 0.2s ease; border: 1px solid var(--line);
}
.collapsible > summary::-webkit-details-marker { display: none; }
.collapsible[open] > summary { border-radius: 8px 8px 0 0; }
.collapsible > summary::after { content: "開く"; color: var(--muted); font-size: 12px; font-weight: normal;}
.collapsible[open] > summary::after { content: "閉じる"; }
.collapsible[open] > .details-body { border: 1px solid var(--line); border-top: 0; border-radius: 0 0 8px 8px; padding: 12px; background: #fff; }

/* ── 車のカード ── */
.trip-cars { display: grid; gap: 12px; margin-top: 12px; }
.trip-card { background: #fff; overflow: hidden; border-radius: 8px; }
.trip-card:hover { transform: none; box-shadow: none; }
.car-summary { display: flex; align-items: center; gap: 12px; position: relative; padding-left: 44px !important; padding-right: 12px !important; }
.car-summary-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-size: 15px; }
.car-summary::after { margin-left: auto; margin-right: 0; }
.collapsible summary .removeCar { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); margin-left: 0; flex-shrink: 0; }
.trip-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-top: 12px; padding: 0 12px 12px;}
.trip-card-head { padding: 12px; border-bottom: 1px solid var(--line); }

/* ── ナンバーステッパー＆距離ツール ── */
.number-stepper { display: grid; grid-template-columns: minmax(0, 1fr) 44px 44px; gap: 6px; align-items: center; }
.number-stepper input { text-align: right; }
.number-stepper input::-webkit-outer-spin-button,
.number-stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.number-stepper input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
.step-button { min-width: 44px; min-height: 38px; padding: 0; color: var(--ink); background: #eef1ef; border: 1px solid var(--line); font-size: 16px; font-weight: bold; }
.step-button:hover { filter: brightness(0.92); transform: none; }
.step-button:active { transform: scale(0.94); }

.distance-tools { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 6px; align-items: center; }
.distance-tools button { min-width: 54px; padding: 0 10px; color: var(--ink); background: #eef1ef; border: 1px solid var(--line); }
.distance-tools button:hover { filter: brightness(0.92); transform: none; }

/* ── スイッチ ── */
.switch input { display: none; }
.switch span { display: block; width: 56px; height: 32px; border-radius: 999px; background: #cfd9d6; position: relative; }
.switch span::after { content: ""; width: 24px; height: 24px; border-radius: 50%; background: #fff; position: absolute; left: 4px; top: 4px; transition: .18s; }
.switch input:checked + span { background: var(--accent); }
.switch input:checked + span::after { transform: translateX(24px); }

/* ── メンバー操作ツール ── */
.participant-tools { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
.participant-tools button { min-width: 0; min-height: 38px; padding: 0 8px; color: var(--ink); background: #eef1ef; border: 1px solid var(--line); font-weight: normal; }
.participant-tools button:hover { filter: brightness(0.92); transform: none; }

/* ── 精算結果テーブル ── */
.table-wrap { width: 100%; overflow: auto; border: 1px solid var(--line); background: #fff; border-radius: 8px; margin-top: 12px; }
table { border-collapse: collapse; width: 100%; font-size: 13px; }
th, td { border: 1px solid var(--line); padding: 6px; text-align: center; min-width: 42px;}
th { background: #edf3f2; color: #285053; font-weight: 700; position: sticky; top: 0; }
td:first-child { text-align: left; font-weight: 700; white-space: nowrap; }
tbody tr:nth-child(even) { background: #f8fbfb; }
tbody tr:hover { background: #eef7f4; }
.credit { color: var(--accent); font-weight: 700; }
.debit { color: var(--accent-2); font-weight: 700; }
.car-breakdown, .history { display: grid; gap: 8px; margin-top: 12px; font-size: 13px; color: var(--muted); }

/* ── サマリーバー＆履歴アイテム ── */
.summary { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; padding: 10px 12px; background: var(--soft); border-radius: 8px; }
.summary span { font-size: 12px; color: var(--muted); }
.history-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
.history-item { display: flex; justify-content: space-between; gap: 12px; width: 100%; background: #fff; color: var(--ink); border: 1px solid var(--line); padding: 12px; border-radius: 8px;}
.history-item span { color: var(--muted); font-size: 12px; }
.muted { color: var(--muted); }
.actions { margin-top: 18px; }

/* ── スマホ用レイアウト ── */
@media (max-width: 760px) {
  .app-header, .section-head, .actions, .summary, .history-item { align-items: stretch; flex-direction: column; }
  .shell, .grid-form, .trip-grid { grid-template-columns: 1fr; }
  .participant-list { grid-template-columns: 1fr; }
  .row-form { display: grid; grid-template-columns: 1fr auto; }
  table { font-size: 12px; }
  th, td { padding: 8px 4px; }
}

/* ── 計算ボタンを黄色に ── */
#calculateButton { 
  color: #2f2600; background: #fff44f; border: 1px solid #f2d400; font-weight: 900; 
}
#calculateButton:hover { filter: brightness(1.02); }

/* ── 車カードの見出しを縦並びに ── */
.car-summary {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px !important;
}
.trip-card-title {
  display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
}
.trip-card-title strong {
  font-size: 15px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.trip-card-meta {
  color: var(--muted); font-size: 12px; font-weight: 500;
}

/* ── 車の削除ボタンを赤色に ── */
.collapsible summary .removeCar {
  position: static; 
  transform: none;
  background: var(--pink);
  color: #fff;
  border: 0;
  border-radius: 7px;
  padding: 8px 14px;
  font-size: 13px; 
  font-weight: 600;
  width: auto; height: auto; min-height: auto; flex-shrink: 0;
  cursor: pointer;
  white-space: nowrap;
  transition: filter .15s, transform .12s, background .15s;
}

.collapsible summary .removeCar:hover {
  background: var(--pink); 
  filter: brightness(0.88); 
  transform: scale(1.03);  /* ホバーで少し大きくなる */
}

.collapsible summary .removeCar:active {
  transform: scale(0.90);  /* クリックでへこむ */
  filter: brightness(0.82);
}

/* ── 車のカードの「開く/閉じる」の文字を消す ── */
.car-collapsible > summary::after {
  display: none !important;
  content: "" !important;
}

/* ── ブラウザ標準の黒い三角マーク(▶)を消す ── */
.collapsible > summary {
  list-style: none !important;
}
.collapsible > summary::-webkit-details-marker,
.collapsible > summary::marker {
  display: none !important;
}

/* ── 「精算結果」の文字と下のブロックを離す ── */
#printTarget h2 {
  margin-bottom: 15px !important; /* 数字を増やすとさらに離れます */
}

/* ── 表（テーブル）を角丸にしてデザインを合わせる ── */
#resultTable table {
  border-collapse: separate !important;
  border-spacing: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 5px;
}

/* セルの内側の線を描く */
#resultTable table th,
#resultTable table td {
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line); 
}

/* 外枠とセルの線が二重にならないように端っこの線を消す */
#resultTable table th:last-child,
#resultTable table td:last-child {
  border-right: none;
}
#resultTable table tr:last-child td {
  border-bottom: none;
}

/* ── 「履歴がない時」などの通知バナーのデザイン（写真と同じスタイル） ── */
.notice {
  border-left: 4px solid var(--accent);
  padding: 10px 12px;
  background: var(--soft);
  color: #285053;
  border-radius: 0 8px 8px 0; /* 右側だけ角を丸くする */
  margin: 0;
  font-size: 14px;
}

.panel h2 {
  margin-bottom: 15px !important;
}

/* ── 「メンバー登録」「車登録」のブロックと、下の入力欄を離す ── */
.collapsible[open] summary {
  margin-bottom: 5px !important;
}

/* ── 履歴アイテムのカード型デザイン ── */
.item { 
  display: grid; grid-template-columns: 1fr auto; gap: 10px; 
  align-items: stretch; border: 1px solid var(--line); 
  border-radius: 8px; padding: 12px; background: #fff; 
  color: var(--ink);
}

.item-main { min-width: 0; display: grid; gap: 3px; }
.item-main strong { font-size: 15px; color: var(--ink); overflow-wrap: anywhere; }
.item-main .mini { color: var(--muted); font-size: 12px; }

/* ── スマホの縦並び設定 ── */
.history .item .actions { 
  display: flex; flex-direction: row; 
  flex-wrap: wrap; gap: 8px; align-items: center; 
  align-self: center; margin-top: 0;
}

/* ── 読込・削除ボタンのカラーとサイズ ── */
button.danger { background: var(--pink); color: #fff; border: none; }
button.ghost { color: var(--ink); background: #eef1ef; border: 1px solid var(--line); }
button.tiny { padding: 8px 14px; font-size: 13px; font-weight: 600; min-height: auto; width: auto; }

</style>
</head>
<body>

<!-- アプリ本体 -->
<div id="app" class="active">
<header class="app-header">
  <div>
    <p class="eyebrow">Transportation expense calculation</p>
    <h1>交通費計算</h1>
</header>

<main class="shell">
  <!-- メンバー -->
  <section class="panel">
    <h2>メンバー</h2>
    <details class="collapsible" open="">
      <summary>メンバー登録</summary>
      <form id="personForm" class="row-form">
        <input name="name" placeholder="名前を追加" required="">
        <button>追加</button>
      </form>

      <div id="peopleList" class="chips"></div>
    </details>
  </section>

  <!-- 車 -->
  <section class="panel">
    <h2>車</h2>
    <details class="collapsible">
      <summary>車登録</summary>
      <form id="carForm" class="grid-form">
        <input name="name" placeholder="車名" required="">
        <button>追加</button>
      </form>

      <div id="carsList" class="chips"></div>
    </details>
  </section>

  <!-- 計算 -->
  <section class="panel wide">
    <div class="section-head">
      <h2>計算</h2>
      <button id="addTripCarButton" class="secondary" type="button">車を追加</button>
    </div>
    <input id="tripTitle" class="title-input" placeholder="名称 例: 20○○-○○ 冬合宿">
    <input id="pdfFileName" class="title-input" placeholder="PDFファイル名 例: 20○○-○○ 冬合宿交通費精算">
  
    <div id="tripCars" class="trip-cars">
      </div>

    <div class="actions">
      <button id="calculateButton">計算</button>
      <button id="saveButton" class="ghost">履歴保存</button>
      <button id="pdfButton">PDF出力</button>
    </div>
  </section>

  <!-- 精算結果 -->
  <section class="panel wide" id="printTarget">
    <h2>精算結果</h2>
    <span id="printTitle" style="display:none"></span>
    <span id="printDate" style="display:none"></span>
    <div id="summary" class="summary"><strong>合計 0 円</strong><span>計算誤差 0 円 / マイナスは受け取る金額です</span></div>
    <div id="resultTable">
    <table>
      <thead><tr><th>名前</th><th>支払済</th><th>負担額</th><th>精密な精算額</th><th>切上精算額</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="car-breakdown">
      <div><strong></strong> 0km / ガソリン 0 円 / 高速 0 円 / 駐車場 0 円 / 一人 0 円</div>
    </div></div>
  </section>

  <!-- 履歴 -->
  <section class="panel wide">
    <h2>履歴</h2>
    <div id="historyList" class="history"><p class="muted">保存した精算結果はまだありません。</p></div>
  </section>
</main>
</div>

<!-- 車カードのテンプレートはJS内で定義 -->

<script>
// window.storage がある環境（Artifactプレビュー）と
// ない環境（ダウンロードしてブラウザで開く）の両方に対応
const ST = (() => {
  const useWindowStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  return {
    async get(k) {
      if (useWindowStorage) {
        try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; } catch { return null; }
      } else {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
      }
    },
    async set(k, v) {
      if (useWindowStorage) {
        try { await window.storage.set(k, JSON.stringify(v)); } catch(e) { console.error(e); }
      } else {
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); }
      }
    }
  };
})();

async function persist() {
  await ST.set('tc_people', state.people);
  await ST.set('tc_cars', state.cars);
  await ST.set('tc_trips', state.trips);
  await ST.set('tc_distance_presets', state.distancePresets);
}

// ── State ──
const state = { people: [], cars: [], trips: [], distancePresets: [], result: null };
const yen = v => `${Math.round(v || 0).toLocaleString()} 円`;
const roundUpSettlement = v => v === 0 ? 0 : Math.sign(v) * Math.ceil(Math.abs(v) / 100) * 100;
function withRoundedSettlements(result) {
  result.people.forEach(p => {
    if (p.rounded_settlement === undefined) p.rounded_settlement = roundUpSettlement(p.settlement);
  });
  result.rounding_error = Math.round(result.people.reduce((sum, p) => sum + (p.rounded_settlement || 0), 0));
  return result;
}
const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const safeFileName = v => { const n = String(v||"").trim().replace(/[\\/:*?"<>|]/g,"_").replace(/\s+/g," "); return n||"travel-cost"; };

// ── CRUD ──
async function removePerson(id, name) {
  if (!confirm(`${name} を削除しますか？ 保存済み履歴の内容は残ります。`)) return;
  state.people = state.people.filter(p => String(p.id) !== String(id));
  await persist(); renderPeople();
}
async function removeCar(id, name) {
  if (!confirm(`${name} を削除しますか？ 保存済み履歴の内容は残ります。`)) return;
  state.cars = state.cars.filter(c => String(c.id) !== String(id));
  await persist(); renderCars();
}
async function removeTrip(id) {
  if (!confirm("この履歴を削除しますか？")) return;
  state.trips = state.trips.filter(t => String(t.id) !== String(id));
  await persist(); renderHistory();
}

// ── Render ──
function renderPeople() {
  peopleList.innerHTML = state.people.map(p => `
    <span class="chip">${esc(p.name)}<button class="delete-button" type="button" data-person-id="${p.id}" data-name="${esc(p.name)}">\u00d7</button></span>
  `).join("");
  peopleList.querySelectorAll("[data-person-id]").forEach(b =>
    b.addEventListener("click", () => removePerson(b.dataset.personId, b.dataset.name))
  );
  document.querySelectorAll(".trip-card").forEach(fillTripCardOptions);
}

function renderCars() {
  carsList.innerHTML = state.cars.map(c => `
    <span class="chip">${esc(c.name)}<button class="delete-button" type="button" data-car-id="${c.id}" data-name="${esc(c.name)}">\u00d7</button></span>
  `).join("");
  carsList.querySelectorAll("[data-car-id]").forEach(b =>
    b.addEventListener("click", () => removeCar(b.dataset.carId, b.dataset.name))
  );
  getTripCards().slice(state.cars.length).forEach(card => card.remove());
  document.querySelectorAll(".trip-card").forEach(fillTripCardOptions);
  refreshTripCarControls();
}

function fillSelect(select, items, labelKey = "name") {
  const current = select.value;
  select.innerHTML = items.map(item => `<option value="${item.id}">${esc(item[labelKey])}</option>`).join("");
  if (items.some(item => String(item.id) === current)) select.value = current;
}

  return new Set(getTripCards()
    .filter(card => card !== exceptCard)
    .map(card => card.querySelector(".carSelect")?.value)
    .filter(Boolean));

function fillCarSelect(card) {
  const select = card.querySelector(".carSelect");
  const current = select.value;
  const selectedIds = getSelectedCarIds(card);
  select.innerHTML = state.cars.map(car => {
    const value = String(car.id);
    const disabled = selectedIds.has(value) ? " disabled" : "";
    return `<option value="${value}"${disabled}>${esc(car.name)}</option>`;
  }).join("");
  const currentIsAvailable = current && state.cars.some(car => String(car.id) === current) && !selectedIds.has(current);
  const fallback = state.cars.find(car => !selectedIds.has(String(car.id)));
  if (currentIsAvailable) select.value = current;
  else if (fallback) select.value = String(fallback.id);
}

    const limitReached = getTripCards().length >= state.cars.length;
    addTripCarButton.disabled = state.cars.length === 0 || limitReached;

// 検索機能を登録する専用の関数
function initParticipantSearch(card) {
  const searchInput = card.querySelector(".participantSearch");
  const list = card.querySelector(".participant-list");
  const clearBtn = card.querySelector(".clearSearchBtn"); // ×ボタンを取得

  // 読み仮名対応の比較用関数
  const normalize = (str) => {
    return str.replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60)).toLowerCase();
  };

  const performSearch = () => {
    const keyword = normalize(searchInput.value);

    // 文字が1文字でもあれば×ボタンを表示、空なら隠す
    clearBtn.style.display = searchInput.value ? "inline-flex" : "none";

    list.querySelectorAll(".check").forEach(label => {
      const name = normalize(label.querySelector("span").textContent);
      label.style.display = (keyword === "" || name.includes(keyword)) ? "" : "none";
    });
  };

  // 入力した瞬間に検索＆×ボタンの表示チェックを走らせる
  searchInput.addEventListener("input", performSearch);

  // ×ボタンを押したときの処理
  clearBtn.addEventListener("click", () => {
    searchInput.value = ""; // 文字を空にする
    performSearch();        // 空の状態で検索をやり直す（全員表示になる）
    searchInput.focus();    // そのまま連続して打てるようにカーソルを戻す
  });

  // 全員選択・解除のイベント登録
  card.querySelector(".selectAllParticipants").addEventListener("click", () => {
    list.querySelectorAll(".check").forEach(l => { 
      if(l.style.display !== "none") l.querySelector(".participantInput").checked = true; 
    });
  });
  card.querySelector(".clearAllParticipants").addEventListener("click", () => {
    list.querySelectorAll(".check").forEach(l => { 
      if(l.style.display !== "none") l.querySelector(".participantInput").checked = false; 
    });
  });
}

// ── ドラッグ選択（ダブルクリックバグ修正＆iPhoneスクロール対応版） ──
function bindParticipantDrag(card) {
  const list = card.querySelector(".participant-list");
  let isDragging = false, dragStarted = false, dragChecked = true;
  let startX = 0, startY = 0, startInput = null, suppressClick = false;

  function setFromPoint(clientX, clientY) {
    const el = document.elementFromPoint(clientX, clientY);
    const check = el?.closest(".check");
    if (!check || !list.contains(check)) return;
    const input = check.querySelector(".participantInput");
    if (input && input.checked !== dragChecked) {
      input.checked = dragChecked;
    }
  }

  // 指やマウスを置いたとき
  list.addEventListener("pointerdown", event => {
    const check = event.target.closest(".check");
    if (!check) return;

    // スマホの場合、チェックボックス付近（左から45px以内）以外を触ったらスクロール優先
    if (event.pointerType === "touch") {
      const rect = check.getBoundingClientRect();
      const offsetX = event.clientX - rect.left;
      if (offsetX > 45) return;
    }

    isDragging = true; 
    dragStarted = false;
    startX = event.clientX; 
    startY = event.clientY;
    startInput = check.querySelector(".participantInput");
    dragChecked = !startInput.checked; 
  });

  // 指やマウスを動かしたとき
  list.addEventListener("pointermove", event => {
    if (!isDragging) return;

    const deltaX = Math.abs(event.clientX - startX);
    const deltaY = Math.abs(event.clientY - startY);
    
    // 少し動いたらドラッグ開始と判定
    if (!dragStarted) {
      if (Math.hypot(deltaX, deltaY) < 5) return;
      dragStarted = true;
      startInput.checked = dragChecked; 
    }

    if (event.pointerType !== "touch") {
      event.preventDefault(); // PCのテキスト選択を防止
    }
    setFromPoint(event.clientX, event.clientY);
  });

  // iPhoneのスクロールを止める
  list.addEventListener("touchmove", event => {
    if (isDragging) {
      // 左側からドラッグを始めた時だけiPhoneの画面スクロールを強制ブロック
      if (event.cancelable) event.preventDefault();
    }
  }, { passive: false });

  // 指やマウスを離したとき
  const endDrag = () => {
    if (dragStarted) suppressClick = true; // ドラッグした後は、勝手なクリックを無効化
    isDragging = false; 
    dragStarted = false; 
    startInput = null;
    if (suppressClick) setTimeout(() => { suppressClick = false; }, 80);
  };

  list.addEventListener("pointerup", endDrag);
  list.addEventListener("pointercancel", endDrag);
  
  // ブラウザの勝手なクリックを制御
  list.addEventListener("click", event => {
    if (suppressClick) {
      event.preventDefault(); 
      event.stopPropagation(); 
      suppressClick = false;
    }
  }, true);
}

function syncCarDefaults(card) {
  const carId = card.querySelector(".carSelect").value;
  const car = state.cars.find(c => String(c.id) === String(carId));
  if (!car) return;
  card.querySelector(".car-summary-name").textContent = `${car.name} カーの設定`;
  // 車名と同じ名前のメンバーがいれば運転手・駐車場支払者を自動セット
  const matched = state.people.find(p => p.name === car.name);
  if (matched) {
    card.querySelector(".driverSelect").value = String(matched.id);
    card.querySelector(".parkingPayerSelect").value = String(matched.id);
  }
}

function bindNumberSteppers(card) {
  card.querySelectorAll(".number-stepper").forEach(stepper => {
    const input = stepper.querySelector("input");
    stepper.querySelectorAll("[data-step]").forEach(button => {
      button.addEventListener("click", event => {
        event.preventDefault();
        const direction = Number(button.dataset.step);
        const step = Number(input.step) || 1;
        const min = input.min === "" ? -Infinity : Number(input.min);
        const max = input.max === "" ? Infinity : Number(input.max);
        const current = input.value === "" ? 0 : Number(input.value);
        const decimals = String(input.step).includes(".") ? String(input.step).split(".")[1].length : 0;
        const next = Math.min(max, Math.max(min, current + direction * step));
        input.value = decimals ? next.toFixed(decimals).replace(/\.?0+$/, "") : String(Math.round(next));
        input.dispatchEvent(new Event("input", { bubbles: true }));
      });
    });
  });
}

function bindDistancePresetControls(card) {
  const select = card.querySelector(".distancePresetSelect");
  const distanceInput = card.querySelector(".distanceInput");
  select.addEventListener("change", () => {
    const preset = state.distancePresets.find(p => String(p.id) === select.value);
    if (!preset) return;
    distanceInput.value = preset.distance;
    distanceInput.dispatchEvent(new Event("input", { bubbles: true }));
  });
  card.querySelector(".saveDistancePreset").addEventListener("click", async () => {
    const distance = Number(distanceInput.value);
    if (!Number.isFinite(distance) || distance <= 0) {
      alert("登録する距離を入力してください");
      return;
    }
    const defaultName = `距離 ${distance}km`;
    const name = prompt("登録名を入力してください", defaultName)?.trim();
    if (!name) return;
    const existing = state.distancePresets.find(p => p.name === name);
    if (existing) {
      if (!confirm("同じ登録名があります。距離を上書きしますか？")) return;
      existing.distance = distance;
    } else {
      const id = state.distancePresets.length ? Math.max(...state.distancePresets.map(p => p.id)) + 1 : 1;
      state.distancePresets.push({ id, name, distance });
    }
    await persist();
    refreshDistancePresetControls();
    select.value = String((existing || state.distancePresets[state.distancePresets.length - 1]).id);
  });
  card.querySelector(".deleteDistancePreset").addEventListener("click", async () => {
    const preset = state.distancePresets.find(p => String(p.id) === select.value);
    if (!preset) {
      alert("削除する登録距離を選択してください");
      return;
    }
    if (!confirm(`${preset.name} を削除しますか？`)) return;
    state.distancePresets = state.distancePresets.filter(p => String(p.id) !== String(preset.id));
    await persist();
    refreshDistancePresetControls();
  });
}

// ── 計算ロジック ──
function calculate_local(data) {
  const people = {};
  data.people.forEach(p => { people[String(p.id)] = p; });
  const balances = {};
  Object.entries(people).forEach(([id, p]) => { balances[id] = { name: p.name, paid: 0, share: 0, settlement: 0 }; });
  const carResults = [];
  for (const car of data.cars) {
    const pids = (car.participant_ids || []).map(String).filter(id => people[id]);
    const driver_id = String(car.driver_id || "");
    let dist = parseFloat(car.distance) || 0;
    if (car.round_trip) dist *= 2;
    const fe = Math.max(parseFloat(car.fuel_efficiency) || 0, 0.01);
    const gp = parseFloat(car.gas_price) || 0;
    const toll = parseFloat(car.toll) || 0;
    const parking = parseFloat(car.parking) || 0;
    const ppid = String(car.parking_payer_id || driver_id);
    const gas_cost = dist / fe * gp;
    const total = gas_cost + toll + parking;
    const share = pids.length ? total / pids.length : 0;
    if (balances[driver_id]) balances[driver_id].paid += gas_cost + toll;
    if (balances[ppid]) balances[ppid].paid += parking;
    pids.forEach(id => { balances[id].share += share; });
    carResults.push({
      car_name: car.car_name || "車", driver_id,
      distance: Math.round(dist * 10) / 10,
      gas_cost: Math.round(gas_cost), toll: Math.round(toll),
      parking: Math.round(parking), total: Math.round(total), share: Math.round(share),
      participants: pids.map(id => people[id].name),
    });
  }
  Object.values(balances).forEach(b => {
    b.paid = Math.round(b.paid); b.share = Math.round(b.share);
    b.settlement = Math.round(b.share - b.paid);
    b.rounded_settlement = roundUpSettlement(b.settlement);
  });
  const allParticipantIds = new Set(data.cars.flatMap(c => (c.participant_ids || []).map(String)));
  const peopleResult = Object.entries(balances)
    .filter(([id]) => allParticipantIds.has(id))
    .map(([, b]) => b);
  const rounding_error = Math.round(peopleResult.reduce((sum, p) => sum + p.rounded_settlement, 0));
  return { cars: carResults, people: peopleResult, total: Math.round(carResults.reduce((s, c) => s + c.total, 0)), rounding_error };
}

        </div>`).join("")
    : '<div class="notice">保存した交通費履歴はまだありません。</div>';

  // 読込ボタンと削除ボタンの動作をセット
  historyList.querySelectorAll(".ghost").forEach(b => b.addEventListener("click", loadTrip));
  historyList.querySelectorAll(".danger").forEach(b => b.addEventListener("click", () => removeTrip(b.dataset.tripDelete)));
}

async function loadTrip(event) {
  const trip = state.trips.find(t => String(t.id) === event.currentTarget.dataset.id);
  if (!trip) return;
  tripTitle.value = trip.data.title;
  tripCars.innerHTML = "";
  trip.data.cars.forEach(saved => {
    addTripCar();
    const card = tripCars.lastElementChild;
    card.querySelector(".carSelect").value = saved.car_id;
    card.querySelector(".driverSelect").value = saved.driver_id;
    card.querySelector(".parkingPayerSelect").value = saved.parking_payer_id;
    card.querySelector(".distanceInput").value = saved.distance;
    card.querySelector(".roundTripInput").checked = saved.round_trip;
    card.querySelector(".fuelEfficiencyInput").value = saved.fuel_efficiency;
    card.querySelector(".gasPriceInput").value = saved.gas_price;
    card.querySelector(".tollInput").value = saved.toll;
    card.querySelector(".parkingInput").value = saved.parking;
    card.querySelectorAll(".participantInput").forEach(input => {
      input.checked = saved.participant_ids.map(String).includes(input.value);
    });
    syncCarDefaults(card);
  });
  refreshTripCarControls();
  renderResult(trip.result);
}

// ── PDF出力（jsPDF によるファイル直接ダウンロード・印刷/プリンター一切不使用） ──
async function exportPDF() {
  // 計算未実施でも0円の結果で出力可能。結果がなければ自動計算する
  const result = withRoundedSettlements(state.result || calculate_local(buildTripPayload()));

  const title   = tripTitle.value.trim() || "交通費精算結果";
  const fileNameBase = document.getElementById("pdfFileName").value.trim() || title;
  const dateStr = new Date().toLocaleString("ja-JP");
  const yen2 = v => `${Math.round(v || 0).toLocaleString()} \u5186`;

  // jsPDF をまだ読み込んでいなければ動的に読み込む
  if (!window.jspdf) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload = resolve;
      s.onerror = () => reject(new Error("jsPDF の読み込みに失敗しました。ネットワーク接続を確認してください。"));
      document.head.appendChild(s);
    }).catch(e => { alert(e.message); throw e; });
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });

  // 日本語フォントが埋め込めないため、文字化けしないよう
  // 日本語テキストを画像化せず「英数字＋円記号」で表現しつつ
  // Unicode対応フォント(Helvetica)で描画する
  // ※ jsPDF 標準は Latin フォントのみなので、日本語は Base64 埋め込みフォントが必要。
  //   ここでは外部依存を最小にするため、テキストを ASCII 安全な形に変換して出力する。
  //   完全な日本語PDF が必要な場合は jspdf-autotable + フォント埋め込みが必要。

  // ── 日本語を含む文字列をそのまま使えるよう、Canvas経由で画像にしてPDFに貼る方式 ──
  // A4: 210×297mm、描画領域: 170×257mm (margin 20mm)
  const MARGIN = 14; // mm
  const PAGE_W = 210;
  const CONTENT_W = PAGE_W - MARGIN * 2;
  const LINE = 7; // mm per line
  let y = MARGIN + 6;

  // Canvas を使って日本語テキストを画像としてPDFに埋め込む関数
  function addTextImage(text, x, yPos, opts = {}) {
    const fontSize = opts.fontSize || 12;
    const color    = opts.color    || "#1f2933";
    const bold     = opts.bold     || false;
    const maxW     = opts.maxW     || (CONTENT_W * 3.78); // mm→px 概算

    const canvas = document.createElement("canvas");
    const scale  = 3; // 高解像度
    const ctx    = canvas.getContext("2d");
    const font   = `${bold ? "bold " : ""}${fontSize * scale}px system-ui,sans-serif`;
    ctx.font = font;
    const measured = ctx.measureText(text).width;
    canvas.width  = Math.min(measured + 4 * scale, maxW * scale);
    canvas.height = (fontSize + 4) * scale;
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textBaseline = "middle";
    ctx.fillText(text, 2 * scale, canvas.height / 2);

    const imgData = canvas.toDataURL("image/png");
    const imgW    = canvas.width  / scale / 3.78; // px→mm
    const imgH    = canvas.height / scale / 3.78;
    doc.addImage(imgData, "PNG", x, yPos - imgH * 0.72, imgW, imgH);
    return imgH;
  }

  // タイトル
  addTextImage(title, MARGIN, y, { fontSize: 18, bold: true });
  y += 9;
  addTextImage(dateStr, MARGIN, y, { fontSize: 9, color: "#66788a" });
  y += 6;
  addTextImage(`合計: ${yen2(result.total)} 計算誤差 ${yen2(result.rounding_error)} マイナスは受け取る金額です`, MARGIN, y, { fontSize: 10 });
  y += 9;

  // 精算結果テーブルヘッダ背景
  const colX = [MARGIN, MARGIN+32, MARGIN+64, MARGIN+96, MARGIN+136];
  const headers = ["名前", "支払済", "負担額", "精密精算", "切上精算"];
  doc.setFillColor(35, 49, 66);
  doc.rect(MARGIN, y - 5, CONTENT_W, 7, "F");
  headers.forEach((h, i) => {
    addTextImage(h, colX[i] + 1, y, { fontSize: 9, color: "#ffffff", bold: true });
  });
  y += 7;

  // 精算結果 行
  result.people.forEach((p, idx) => {
    if (idx % 2 === 0) {
      doc.setFillColor(240, 245, 248);
      doc.rect(MARGIN, y - 5, CONTENT_W, 7, "F");
    }
    const settlColor = p.settlement < 0 ? "#2f7d6d" : "#a23e48";
    const roundedColor = p.rounded_settlement < 0 ? "#2f7d6d" : "#a23e48";
    addTextImage(p.name,                     colX[0] + 1, y, { fontSize: 8 });
    addTextImage(yen2(p.paid),               colX[1] + 1, y, { fontSize: 8 });
    addTextImage(yen2(p.share),              colX[2] + 1, y, { fontSize: 8 });
    addTextImage(yen2(p.settlement),         colX[3] + 1, y, { fontSize: 8, color: settlColor, bold: true });
    addTextImage(yen2(p.rounded_settlement), colX[4] + 1, y, { fontSize: 8, color: roundedColor, bold: true });
    y += 7;
  });

  y += 4;
  // 車別内訳
  addTextImage("車別内訳", MARGIN, y, { fontSize: 10, bold: true });
  y += 6;
  result.cars.forEach(c => {
    const line = `${c.car_name}  ${c.distance}km  ガソリン ${yen2(c.gas_cost)}  高速 ${yen2(c.toll)}  駐車場 ${yen2(c.parking)}  一人 ${yen2(c.share)}`;
    addTextImage(line, MARGIN, y, { fontSize: 8, color: "#66788a", maxW: CONTENT_W * 3.78 });
    y += 5.5;
  });

  // ダウンロード
  const safeFile = fileNameBase.replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, " ").trim() || "travel-cost";
  doc.save(`${safeFile}.pdf`);
}

// ── イベント ──
personForm.addEventListener("submit", async event => {
  event.preventDefault();
  const name = new FormData(personForm).get("name").trim();
  if (!name) return;
  if (state.people.find(p => p.name === name)) { alert("同じ名前が登録済みです"); return; }
  const id = state.people.length ? Math.max(...state.people.map(p => p.id)) + 1 : 1;
  state.people.push({ id, name }); personForm.reset();
  await persist(); renderPeople();
});

carForm.addEventListener("submit", async event => {
  event.preventDefault();
  const body = Object.fromEntries(new FormData(carForm));
  const name = body.name.trim();
  if (!name) return;
  if (state.cars.find(c => c.name === name)) { alert("同じ車名が登録済みです"); return; }
  const id = state.cars.length ? Math.max(...state.cars.map(c => c.id)) + 1 : 1;
  state.cars.push({ id, name });
  carForm.reset();
  await persist(); renderCars();
});

addTripCarButton.addEventListener("click", addTripCar);
tripCars.addEventListener("click", event => {
  const button = event.target.closest(".removeCar");
  if (!button || !tripCars.contains(button)) return;
  event.preventDefault();
  event.stopPropagation();
  button.closest(".trip-card")?.remove();
  refreshTripCarControls();
});
calculateButton.addEventListener("click", () => renderResult(calculate_local(buildTripPayload())));
saveButton.addEventListener("click", async () => {
  const payload = buildTripPayload();
  const result = calculate_local(payload);
  const id = state.trips.length ? Math.max(...state.trips.map(t => t.id)) + 1 : 1;
  state.trips.unshift({ id, title: payload.title, created_at: new Date().toLocaleString("ja-JP"), data: payload, result });
  renderResult(result); await persist(); renderHistory();
});
pdfButton.addEventListener("click", exportPDF);

// ── 起動 ──
async function boot() {
  const [savedPeople, savedCars, savedTrips, savedDistancePresets] = await Promise.all([
    ST.get('tc_people'), ST.get('tc_cars'), ST.get('tc_trips'), ST.get('tc_distance_presets')
  ]);
  state.people = (savedPeople && savedPeople.length) ? savedPeople : [];
  state.cars   = (savedCars && savedCars.length)   ? savedCars   : [];
  state.trips  = (savedTrips && savedTrips.length)  ? savedTrips  : [];
  state.distancePresets = (savedDistancePresets && savedDistancePresets.length) ? savedDistancePresets : [];
  renderPeople(); renderCars(); renderHistory();
  tripCars.innerHTML = "";

  if(state.cars.length > 0) {
    addTripCar();
  }
}

boot();
